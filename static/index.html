<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seabank Browser Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Seabank Browser Agent</h1>
            <p class="subtitle">
                Tự động hóa đăng nhập bằng <span class="brand-ollama">Ollama Local</span>
            </p>
        </header>

        <div class="layout">
            <!-- Form Section -->
            <div class="card">
                <form id="agentForm">
                    <div class="form-group">
                        <label for="url">Trang web đích</label>
                        <input type="url" id="url" name="url" value="https://vanban.seabank.com.vn" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Tài khoản Đăng nhập</label>
                        <input type="text" id="username" name="username" required placeholder="Tên đăng nhập / Email">
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="instruction">Yêu cầu nhiệm vụ (Task)</label>
                        <textarea id="instruction" name="instruction" rows="4" required placeholder="Ví dụ: Tìm 3 văn bản mới nhất trên trang web và tải về phiên bản PDF."></textarea>
                    </div>

                    <div class="form-group examples">
                        <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Mẫu nhiệm vụ:</p>
                        <div class="example-tags">
                            <span class="tag" onclick="setExample('https://vanban.seabank.com.vn', 'Tải văn bản mới nhất')">SeaBank Doc</span>
                            <span class="tag" onclick="setExample('https://nbg1-speed.hetzner.com/', 'Download 100MB file')">Hetzner Speedtest</span>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Bắt đầu thực thi
                    </button>
                    <button type="button" id="stopBtn" class="btn btn-danger" style="display: none; margin-top: 10px;" disabled>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                        Dừng Agent
                    </button>
                </form>
            </div>

            <!-- Terminal Section -->
            <div class="card">
                <div class="terminal-header">
                    <h2>Tiến trình Live (Logs)</h2>
                    <span id="statusBadge" class="badge">Chưa chạy</span>
                </div>

                <div id="terminal" class="terminal-log">Mời bạn nhập thông tin ở khung bên trái và bấm Bắt đầu thực thi...</div>

                <div id="resultBlock" class="result-card" style="display: none;">
                    <h3 class="result-title">Kết quả:</h3>
                    <p id="resultText" style="white-space: pre-wrap; font-size: 0.9rem;"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/sse-client.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
